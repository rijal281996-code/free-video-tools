<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikTok Video Downloader - Free HD Download</title>

<meta name="description" content="Free TikTok video downloader without watermark. Fast, free and easy to use.">

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#1e293b;
padding:20px;
font-size:22px;
font-weight:bold;
}

.hero{
margin-top:80px;
}

.hero h1{
font-size:32px;
}

input{
padding:14px;
width:280px;
border:none;
border-radius:8px;
margin-top:20px;
}

button{
padding:14px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:40px;
}

footer{
margin-top:120px;
background:#020617;
padding:20px;
font-size:14px;
}

</style>

</head>

<body>

<header>
Free Video Downloader
</header>

<section class="hero">

<h1>TikTok Video Downloader</h1>

<p>Download TikTok videos without watermark</p>

<input id="videoUrl" type="text" placeholder="Paste TikTok link here">

<button onclick="downloadVideo()">Download</button>

<div class="result" id="result"></div>

</section>

<footer>

<p>© 2026 Free Video Tools</p>

</footer>

<script>

async function downloadVideo(){

const url = document.getElementById("videoUrl").value;

if(!url){
alert("Paste video link first");
return;
}

document.getElementById("result").innerHTML="Processing...";

try{

const response = await fetch("https://video-downloader-api--rijalpermana28.replit.app/api/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:url})
});

const data = await response.json();

if(data.download){

document.getElementById("result").innerHTML=
`<a href="${data.download}" target="_blank">
<button>Download Video</button>
</a>`;

}else{

document.getElementById("result").innerHTML="Video not found";

}

}catch(e){

document.getElementById("result").innerHTML="Error connecting to server";

}

}

</script>

</body>
</html>
