<!DOCTYPE html>
<html>
<head>
<title>All Video Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0b1b2b;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

input{
width:100%;
padding:15px;
border-radius:8px;
border:none;
margin-top:20px;
}

button{
padding:15px 30px;
margin-top:15px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:18px;
cursor:pointer;
}

.platforms{
margin-top:20px;
color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>All Video Downloader</h1>

<p>Download videos from multiple platforms</p>

<input id="url" placeholder="Paste video link here">

<button onclick="download()">Download</button>

<div class="platforms">
Supports:<br><br>
TikTok • YouTube • Instagram • Facebook • Twitter
</div>

</div>

<script>


async function download(){

let url=document.getElementById("url").value

let api="https://video-downloader-api--rijalpermana28.replit.app/api"

let res=await fetch(api+"/download?url="+encodeURIComponent(url))

let data=await res.json()

if(data.video){

window.open(data.video)

}else{

alert("Video tidak bisa diambil")

}

}

</script>
